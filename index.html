<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 级视觉体验 - Mengzu</title>
    <style>
        /* Apple 风格的基础设定 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro SC", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #f5f5f7;
            overflow-x: hidden;
        }

        /* 极简导航栏 */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 5vw;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        nav .logo { font-weight: 600; font-size: 18px; color: #f5f5f7; letter-spacing: 0.5px;}

        /* Apple 经典的满屏滚动视差区 */
        .apple-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 20px;
        }

        /* 文字动画层 */
        .text-layer {
            text-align: center;
            z-index: 10;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .text-layer h1 {
            font-size: 56px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 15px;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-layer .green-text { background: linear-gradient(180deg, #86efac 0%, #22c55e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .text-layer p { font-size: 24px; font-weight: 400; color: #86868b; }

        /* 图片动画层 */
        .image-layer {
            margin-top: 40px;
            width: 100%;
            height: 60vh;
            display: flex;
            justify-content: center;
            opacity: 0;
            transform: scale(0.9) translateY(60px);
            transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s, transform 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
        }
        .image-layer img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 触发后的激活状态 */
        .apple-section.active .text-layer { opacity: 1; transform: translateY(0); }
        .apple-section.active .image-layer { opacity: 1; transform: scale(1) translateY(0); }

        /* 最终的长详情页 */
        .detail-section { width: 100%; background: #000; text-align: center; padding: 100px 0; }
        .detail-section img { max-width: 100%; width: 800px; display: block; margin: 0 auto;}

    </style>
</head>
<body>

    <nav>
        <div class="logo">Mengzu Pro</div>
    </nav>

    <section class="apple-section">
        <div class="text-layer">
            <h1 class="green-text">旗舰级电竞性能</h1>
            <p>最高 26000 DPI，精准跟手</p>
        </div>
        <div class="image-layer">
            <img src="1.jpg" alt="性能篇">
        </div>
    </section>

    <section class="apple-section">
        <div class="text-layer">
            <h1>轻量化握持。</h1>
            <p>56g，重塑手感新境界。</p>
        </div>
        <div class="image-layer">
            <img src="4.jpg" alt="轻量化">
        </div>
    </section>

    <section class="apple-section">
        <div class="text-layer">
            <h1>一亿次环宇微动。</h1>
            <p>更准，更稳，更快。</p>
        </div>
        <div class="image-layer">
            <img src="5.jpg" alt="微动">
        </div>
    </section>

    <section class="apple-section">
        <div class="text-layer">
            <h1>800mAh 续航怪兽。</h1>
            <p>一吸即充，告别焦虑。</p>
        </div>
        <div class="image-layer">
            <img src="3.jpg" alt="电池">
        </div>
    </section>

    <section class="apple-section">
        <div class="text-layer">
            <h1>EHUB 双端驱动。</h1>
            <p>简单好用，云端秒同步。</p>
        </div>
        <div class="image-layer">
            <img src="2.jpg" alt="驱动">
        </div>
    </section>

    <section class="detail-section">
        <img src="6.jpg?v=2" alt="详情长图">
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.3 }); 

            document.querySelectorAll('.apple-section').forEach(section => {
                observer.observe(section);
            });
        });
    </script>

</body>
</html>
