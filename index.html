<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人作品集</title>
    <style>
        /* =========================================
           基础样式与布局
           ========================================= */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            /* 【防盗 CSS 1】禁止用户选中文本 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 3rem 0;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        header p {
            margin-top: 10px;
            font-size: 1.1rem;
            color: #bdc3c7;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .portfolio-item {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
        }

        .portfolio-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            /* 【防盗 CSS 2】禁用图片的鼠标事件（无法右键点击图片本身或拖拽） */
            pointer-events: none; 
        }

        .item-info {
            padding: 15px;
            text-align: center;
        }

        .item-info h3 {
            margin: 0 0 10px 0;
            color: #2c3e50;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #2c3e50;
            color: #fff;
            margin-top: 40px;
        }

        /* 水印层示例（覆盖在图片上的透明防盗层） */
        .img-wrapper {
            position: relative;
        }
        .watermark-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: transparent;
            z-index: 10;
        }

    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <header>
        <h1>设计师作品集</h1>
        <p>探索我的视觉艺术与设计项目 (已开启版权保护)</p>
    </header>

    <div class="container">
        <div class="gallery">
            <div class="portfolio-item">
                <div class="img-wrapper">
                    <div class="watermark-overlay"></div>
                    <img src="https://images.unsplash.com/photo-1561070791-2526d30994b5?w=500&q=80" alt="作品1">
                </div>
                <div class="item-info">
                    <h3>品牌视觉设计</h3>
                    <p>2026年商业企划案例</p>
                </div>
            </div>

            <div class="portfolio-item">
                <div class="img-wrapper">
                    <div class="watermark-overlay"></div>
                    <img src="https://images.unsplash.com/photo-1626785774573-4b799315345d?w=500&q=80" alt="作品2">
                </div>
                <div class="item-info">
                    <h3>UI/UX 界面设计</h3>
                    <p>移动端 APP 重构项目</p>
                </div>
            </div>

            <div class="portfolio-item">
                <div class="img-wrapper">
                    <div class="watermark-overlay"></div>
                    <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?w=500&q=80" alt="作品3">
                </div>
                <div class="item-info">
                    <h3>插画艺术</h3>
                    <p>个人实验性创作</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 我的作品集. All Rights Reserved. 禁止未经授权的复制与下载。</p>
    </footer>

    <script>
        // 1. 禁用全局右键菜单
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        });

        // 2. 禁用键盘上常用的开发者工具及复制快捷键
        document.addEventListener('keydown', function(event) {
            // 禁用 F12 (打开开发者工具)
            if (event.keyCode === 123) {
                event.preventDefault();
                return false;
            }
            // 禁用 Ctrl+Shift+I 或 Cmd+Opt+I (打开开发者工具)
            if ((event.ctrlKey && event.shiftKey && event.keyCode === 73) || (event.metaKey && event.altKey && event.keyCode === 73)) {
                event.preventDefault();
                return false;
            }
            // 禁用 Ctrl+U 或 Cmd+Opt+U (查看网页源代码)
            if ((event.ctrlKey && event.keyCode === 85) || (event.metaKey && event.altKey && event.keyCode === 85)) {
                event.preventDefault();
                return false;
            }
            // 禁用 Ctrl+S 或 Cmd+S (保存网页)
            if ((event.ctrlKey && event.keyCode === 83) || (event.metaKey && event.keyCode === 83)) {
                event.preventDefault();
                return false;
            }
            // 禁用 Ctrl+C 或 Cmd+C (复制)
            if ((event.ctrlKey && event.keyCode === 67) || (event.metaKey && event.keyCode === 67)) {
                event.preventDefault();
                return false;
            }
        });

        // 3. 禁用拖拽事件 (防止用户直接把图片拖到桌面)
        document.addEventListener('dragstart', function(event) {
            event.preventDefault();
        });

        // 4. 反调试控制台 (如果有人强行打开 F12 控制台，会导致卡死在 debugger 状态)
        // 警告：开启此功能可能会影响正常用户的体验，此处作为示例提供
        setInterval(function() {
            check();
        }, 1000);
        var check = function() {
            function doCheck(a) {
                if (("" + a / a)["length"] !== 1 || a % 20 === 0) {
                    (function() {}
                    ["constructor"]("debugger")())
                } else {
                    (function() {}
                    ["constructor"]("debugger")())
                }
                doCheck(++a)
            }
            try {
                doCheck(0)
            } catch (err) {}
        };
    </script>
</body>
</html>
